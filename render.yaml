services:
  - type: web
    name: bank-api
    runtime: python
    plan: free
    buildCommand: pip install -r api/requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bank-db
          property: connectionString

databases:
  - name: bank-db
    plan: free
    databaseName: bank
    user: data
